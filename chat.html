<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Chat Bot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg flex flex-col h-[600px]">

    <div class="bg-green-500 text-white p-4 rounded-t-2xl font-bold">
      🤖 Atendimento Automático
    </div>

    <div id="chat" class="flex-1 p-4 overflow-y-auto space-y-2">
    </div>

    <div class="p-4 border-t flex gap-2">
      <input id="input" class="flex-1 border rounded-lg p-2" placeholder="Digite sua mensagem...">
      <button onclick="enviarMensagem()" class="bg-green-500 text-white px-4 rounded-lg">
        Enviar
      </button>
    </div>

  </div>

  <script>
    const telefone = "51999999999";

    function adicionarMensagem(texto, tipo) {
      const chat = document.getElementById("chat");

      const div = document.createElement("div");
      div.className = tipo === "user"
        ? "text-right"
        : "text-left";

      div.innerHTML = `
        <span class="inline-block px-3 py-2 rounded-lg ${tipo === "user" ? "bg-green-500 text-white" : "bg-gray-200"}">
          ${texto}
        </span>
      `;

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function enviarMensagem() {
      const input = document.getElementById("input");
      const mensagem = input.value;

      if (!mensagem) return;

      adicionarMensagem(mensagem, "user");

      input.value = "";

      const response = await fetch("http://127.0.0.1:5000/webhook", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          telefone: telefone,
          mensagem: mensagem
        })
      });

      const data = await response.json();

      adicionarMensagem(data.resposta, "bot");
    }
  </script>

</body>
</html>
